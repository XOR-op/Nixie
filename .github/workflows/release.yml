name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.feature }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: cuda-12
            target: x86_64-unknown-linux-gnu
            artifact: nixie-cu12
          - feature: cuda-13
            target: x86_64-unknown-linux-gnu
            artifact: nixie-cu13

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        if: ${{ !env.ACT }}
        with:
          ref: ${{ inputs.tag }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: |
          cargo build \
            --release \
            --no-default-features \
            --features "${{ matrix.feature }}" \
            --target "${{ matrix.target }}"

      - name: Package release
        run: |
          set -euo pipefail

          package_dir="${{ matrix.artifact }}"
          target_dir="target/${{ matrix.target }}/release"

          mkdir -p "${package_dir}/nixie"
          cp "${target_dir}/nixie" "${package_dir}/nixie/"
          cp "${target_dir}/libnixiesidecar.so" "${package_dir}/nixie/"
          cp LICENSE "${package_dir}/nixie/"

          tar -C "${package_dir}" -czf "${package_dir}.tar.gz" nixie

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          if-no-files-found: error
      # for local CI run
      - name: Clean up
        run: rm -rf "${{ matrix.artifact }}" "${{ matrix.artifact }}.tar.gz"

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          files: artifacts/*.tar.gz
