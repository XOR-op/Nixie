      <path d="M34 34V106 M34 34L58 70L82 106 M82 34V106"/>
      <path d="M130 34H178 M130 106H178 M154 34V106"/>
      <path d="M226 34L250 70L274 106 M274 34L250 70L226 106"/>
      <path d="M322 34H370 M322 106H370 M346 34V106"/>
      <path d="M466 34H418V106H466 M418 70H442"/>
