    <path d="M112 32 Q112 16 128 16 H180 Q196 16 196 32 V120 H112 Z"/>
    <path d="M208 32 Q208 16 224 16 H276 Q292 16 292 32 V120 H208 Z"/>
    <path d="M304 32 Q304 16 320 16 H372 Q388 16 388 32 V120 H304 Z"/>
    <path d="M400 32 Q400 16 416 16 H468 Q484 16 484 32 V120 H400 Z"/>
