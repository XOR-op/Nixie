<svg viewBox="0 0 500 162" xmlns="http://www.w3.org/2000/svg" width="100%" role="img" aria-label="NIXIE">
  <title>NIXIE</title>

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="wideGlow" x="-30%" y="-30%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="nixieStroke" x1="0" y1="30" x2="0" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB64F"/>
      <stop offset="14%" stop-color="#FF9D3A"/>
      <stop offset="32%" stop-color="#FF6A1A"/>
      <stop offset="50%" stop-color="#FFC057"/>
      <stop offset="68%" stop-color="#F06A16"/>
      <stop offset="84%" stop-color="#FF9A35"/>
      <stop offset="100%" stop-color="#FFB05A"/>
    </linearGradient>

    <pattern id="hex" width="27" height="15.588" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#FFAC33" stroke-width="1" opacity="0.35">
        <polygon points="9,0 4.5,7.794 -4.5,7.794 -9,0 -4.5,-7.794 4.5,-7.794"/>
        <polygon points="36,0 31.5,7.794 22.5,7.794 18,0 22.5,-7.794 31.5,-7.794"/>
        <polygon points="9,15.588 4.5,23.382 -4.5,23.382 -9,15.588 -4.5,7.794 4.5,7.794"/>
        <polygon points="36,15.588 31.5,23.382 22.5,23.382 18,15.588 22.5,7.794 31.5,7.794"/>
        <polygon points="22.5,7.794 18,15.588 9,15.588 4.5,7.794 9,0 18,0"/>
        <polygon points="22.5,-7.794 18,0 9,0 4.5,-7.794 9,-15.588 18,-15.588"/>
        <polygon points="22.5,23.382 18,31.176 9,31.176 4.5,23.382 9,15.588 18,15.588"/>
      </g>
    </pattern>
  </defs>

  <rect x="0" y="120" width="500" height="26" rx="5" fill="#0B0908"/>

  <g fill="#0B0908">
    <path d="M16 32 Q16 16 32 16 H84 Q100 16 100 32 V130 H16 Z"/>
    <path d="M112 32 Q112 16 128 16 H180 Q196 16 196 32 V130 H112 Z"/>
    <path d="M208 32 Q208 16 224 16 H276 Q292 16 292 32 V130 H208 Z"/>
    <path d="M304 32 Q304 16 320 16 H372 Q388 16 388 32 V130 H304 Z"/>
    <path d="M400 32 Q400 16 416 16 H468 Q484 16 484 32 V130 H400 Z"/>
